name: Publish workspaces
description: Publish non-private workspace packages in dependency order.

inputs:
  mode:
    description: One of `release`, `canary`, or `cleanup`.
    required: true
  pr-number:
    description: Pull request number for canary dist-tags.
    required: false
  head-sha:
    description: Pull request head SHA for canary versions.
    required: false

outputs:
  install_lines:
    description: Install commands for canary packages.
    value: ${{ steps.publish.outputs.install_lines }}

runs:
  using: composite
  steps:
    - name: Publish workspaces
      id: publish
      shell: bash
      env:
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_PR_NUMBER: ${{ inputs.pr-number }}
        INPUT_HEAD_SHA: ${{ inputs.head-sha }}
      run: node "$GITHUB_ACTION_PATH/publish-workspaces.mjs"
