name: Bun build
description: Set up Bun, install dependencies, build, and optionally validate.

inputs:
  bun-version-file:
    description: Path to the Bun version file in the caller repository.
    default: .tool-versions
  generated-output-dir:
    description: Generated Datasworn JSON directory that must stay in sync when present.
    default: generated-datasworn
  validate:
    description: Run `bun run validate` after the build.
    default: "false"
  audit-level:
    description: >
      `bun audit --audit-level=<level>` threshold (low, moderate, high,
      critical, or `off` to skip the audit step entirely). Defaults to
      `moderate` so any CVE that isn't dev-time-only fails the PR.
    default: moderate
  audit-ignore:
    description: >
      Comma-separated list of GHSA IDs to pass as `--ignore=` flags to
      `bun audit`. Use for transitive advisories that have no upstream
      fix or that ride along with dev-only tooling. Example:
      `GHSA-xxjr-mmjv-4gpg,GHSA-r5fr-rjxr-66jc`.
    default: ""

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version-file: ${{ inputs.bun-version-file }}

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile

    - name: Audit dependencies
      if: inputs.audit-level != 'off'
      shell: bash
      env:
        AUDIT_LEVEL: ${{ inputs.audit-level }}
        AUDIT_IGNORE: ${{ inputs.audit-ignore }}
      run: |
        set -euo pipefail
        ignore_flags=()
        if [[ -n "${AUDIT_IGNORE}" ]]; then
          IFS=',' read -ra ids <<< "${AUDIT_IGNORE}"
          for id in "${ids[@]}"; do
            trimmed="${id// /}"
            if [[ -n "${trimmed}" ]]; then
              ignore_flags+=("--ignore=${trimmed}")
            fi
          done
        fi
        bun audit --audit-level="${AUDIT_LEVEL}" "${ignore_flags[@]}"

    - name: Build
      shell: bash
      run: bun run build

    - name: Check generated Datasworn output
      shell: bash
      run: |
        set -euo pipefail

        generated_dir="${{ inputs.generated-output-dir }}"
        if [[ ! -d "${generated_dir}" ]]; then
          exit 0
        fi

        if [[ -n "$(git status --porcelain -- "${generated_dir}")" ]]; then
          echo "::error::${generated_dir} is out of sync. Run bun run build and commit the generated output."
          git status --short -- "${generated_dir}"
          git diff -- "${generated_dir}"
          exit 1
        fi

    - name: Validate
      if: inputs.validate == 'true'
      shell: bash
      run: bun run validate
