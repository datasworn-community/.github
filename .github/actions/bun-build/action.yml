name: Bun build
description: Set up Bun, install dependencies, build, and optionally validate.

inputs:
  bun-version-file:
    description: Path to the Bun version file in the caller repository.
    default: .tool-versions
  generated-output-dir:
    description: Generated Datasworn JSON directory that must stay in sync when present.
    default: generated-datasworn
  validate:
    description: Run `bun run validate` after the build.
    default: "false"

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version-file: ${{ inputs.bun-version-file }}

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile

    - name: Build
      shell: bash
      run: bun run build

    - name: Check generated Datasworn output
      shell: bash
      run: |
        set -euo pipefail

        generated_dir="${{ inputs.generated-output-dir }}"
        if [[ ! -d "${generated_dir}" ]]; then
          exit 0
        fi

        if [[ -n "$(git status --porcelain -- "${generated_dir}")" ]]; then
          echo "::error::${generated_dir} is out of sync. Run bun run build and commit the generated output."
          git status --short -- "${generated_dir}"
          git diff -- "${generated_dir}"
          exit 1
        fi

    - name: Validate
      if: inputs.validate == 'true'
      shell: bash
      run: bun run validate
