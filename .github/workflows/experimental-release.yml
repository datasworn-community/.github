name: Experimental Release

on:
  workflow_call:
    secrets:
      NPM_TOKEN:
        required: false

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  instructions:
    name: Post canary instructions
    if: >
      github.event.action == 'opened' ||
      github.event.action == 'reopened' ||
      github.event.action == 'ready_for_review'
    runs-on: ubuntu-latest

    steps:
      - name: Update PR comment
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          marker='<!-- datasworn-community experimental release -->'
          body="$(cat <<EOF
          ${marker}
          Need an experimental publish for this PR? Add the \`release_experimental\` label.

          While the label is present, every push publishes fresh canaries with the \`pr-${{ github.event.pull_request.number }}\` npm dist-tag. Remove the label to stop publishing canaries.
          EOF
          )"

          comment_id="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq ".[] | select(.body | startswith(\"${marker}\")) | .id" | head -n 1)"

          if [[ -n "${comment_id}" ]]; then
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" -f body="${body}"
          else
            gh api "repos/${GITHUB_REPOSITORY}/issues/${{ github.event.pull_request.number }}/comments" -f body="${body}"
          fi

  canary:
    name: Publish canary packages
    if: >
      (github.event.action == 'labeled' && github.event.label.name == 'release_experimental') ||
      (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'release_experimental'))
    runs-on: ubuntu-latest
    concurrency:
      group: canary-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Note fork limitation
        if: github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          marker='<!-- datasworn-community experimental release -->'
          body="$(cat <<EOF
          ${marker}
          Canaries run on internal branches only because GitHub does not expose publishing secrets to fork pull requests.
          EOF
          )"

          comment_id="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq ".[] | select(.body | startswith(\"${marker}\")) | .id" | head -n 1)"

          if [[ -n "${comment_id}" ]]; then
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" -f body="${body}"
          else
            gh api "repos/${GITHUB_REPOSITORY}/issues/${{ github.event.pull_request.number }}/comments" -f body="${body}"
          fi

      - name: Checkout
        if: github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Build
        if: github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
        uses: datasworn-community/.github/.github/actions/bun-build@v1

      - name: Setup Node for npm publishing
        if: github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Setup npm
        if: github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
        run: |
          npm install --global npm@latest
          npm config set registry https://registry.npmjs.org/
          npm --version

      - name: Publish canary packages
        if: github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
        id: publish
        uses: datasworn-community/.github/.github/actions/publish-workspaces@v1
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        with:
          mode: canary
          pr-number: ${{ github.event.pull_request.number }}
          head-sha: ${{ github.event.pull_request.head.sha }}

      - name: Update PR comment
        if: github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
        env:
          GH_TOKEN: ${{ github.token }}
          INSTALL_LINES: ${{ steps.publish.outputs.install_lines }}
        shell: bash
        run: |
          set -euo pipefail

          marker='<!-- datasworn-community experimental release -->'
          body="$(cat <<EOF
          ${marker}
          Published experimental packages for ${GITHUB_SHA}.

          \`\`\`sh
          ${INSTALL_LINES}
          \`\`\`
          EOF
          )"

          comment_id="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq ".[] | select(.body | startswith(\"${marker}\")) | .id" | head -n 1)"

          if [[ -n "${comment_id}" ]]; then
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" -f body="${body}"
          else
            gh api "repos/${GITHUB_REPOSITORY}/issues/${{ github.event.pull_request.number }}/comments" -f body="${body}"
          fi

  cleanup:
    name: Remove canary dist-tags
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node for npm publishing
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Setup npm
        run: |
          npm install --global npm@latest
          npm config set registry https://registry.npmjs.org/
          npm --version

      - name: Remove PR dist-tags
        uses: datasworn-community/.github/.github/actions/publish-workspaces@v1
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        with:
          mode: cleanup
          pr-number: ${{ github.event.pull_request.number }}
