name: Experimental Release

on:
  workflow_call:
    secrets:
      NPM_TOKEN:
        required: false

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  canary:
    name: Publish canary packages
    if: >
      (github.event.action == 'labeled' && github.event.label.name == 'release_experimental') ||
      (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'release_experimental'))
    runs-on: ubuntu-latest
    concurrency:
      group: canary-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Note fork limitation
        if: github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          marker='<!-- datasworn-community experimental release -->'
          body="$(cat <<EOF
          ${marker}
          Canaries run on internal branches only because GitHub does not expose publishing secrets to fork pull requests.
          EOF
          )"

          comment_id="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq ".[] | select(.body | startswith(\"${marker}\")) | .id" | head -n 1)"

          if [[ -n "${comment_id}" ]]; then
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" -f body="${body}"
          else
            gh api "repos/${GITHUB_REPOSITORY}/issues/${{ github.event.pull_request.number }}/comments" -f body="${body}"
          fi

      - name: Checkout
        if: github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Build
        if: github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
        uses: datasworn-community/.github/.github/actions/bun-build@v1

      - name: Setup Node for npm publishing
        if: github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Setup npm
        if: github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
        run: |
          npm install --global npm@latest
          npm config set registry https://registry.npmjs.org/
          npm --version

      - name: Publish canary packages
        if: github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
        id: publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail

          short_sha="${HEAD_SHA::12}"
          dist_tag="pr-${PR_NUMBER}"
          install_lines=""

          while IFS= read -r manifest; do
            if node -e "const pkg=require(process.argv[1]); process.exit(pkg.private ? 0 : 1)" "$manifest"; then
              continue
            fi

            package_dir="$(dirname "$manifest")"
            package_name="$(node -p "require(process.argv[1]).name" "$manifest")"
            current_version="$(node -p "require(process.argv[1]).version" "$manifest")"
            canary_version="${current_version}-experimental.${PR_NUMBER}.${short_sha}"

            echo "Publishing ${package_name}@${canary_version} from ${package_dir}"
            npm --prefix "$package_dir" version "$canary_version" --no-git-tag-version
            npm publish "$package_dir" --access public --provenance --tag "$dist_tag"

            install_lines="${install_lines}"$'\n'"npm i ${package_name}@${canary_version}"
            install_lines="${install_lines}"$'\n'"npm i ${package_name}@${dist_tag}"
          done < <(
            find . \
              -path './node_modules' -prune -o \
              -path './.git' -prune -o \
              -name package.json -print
          )

          {
            echo 'install_lines<<EOF'
            printf '%s\n' "$install_lines"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Update PR comment
        if: github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
        env:
          GH_TOKEN: ${{ github.token }}
          INSTALL_LINES: ${{ steps.publish.outputs.install_lines }}
        shell: bash
        run: |
          set -euo pipefail

          marker='<!-- datasworn-community experimental release -->'
          body="$(cat <<EOF
          ${marker}
          Published experimental packages for ${GITHUB_SHA}.

          \`\`\`sh
          ${INSTALL_LINES}
          \`\`\`
          EOF
          )"

          comment_id="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq ".[] | select(.body | startswith(\"${marker}\")) | .id" | head -n 1)"

          if [[ -n "${comment_id}" ]]; then
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" -f body="${body}"
          else
            gh api "repos/${GITHUB_REPOSITORY}/issues/${{ github.event.pull_request.number }}/comments" -f body="${body}"
          fi

  cleanup:
    name: Remove canary dist-tags
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node for npm publishing
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Setup npm
        run: |
          npm install --global npm@latest
          npm config set registry https://registry.npmjs.org/
          npm --version

      - name: Remove PR dist-tags
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail

          dist_tag="pr-${PR_NUMBER}"

          while IFS= read -r manifest; do
            if node -e "const pkg=require(process.argv[1]); process.exit(pkg.private ? 0 : 1)" "$manifest"; then
              continue
            fi

            package_name="$(node -p "require(process.argv[1]).name" "$manifest")"
            echo "Removing ${package_name}@${dist_tag}"
            npm dist-tag rm "$package_name" "$dist_tag" || true
          done < <(
            find . \
              -path './node_modules' -prune -o \
              -path './.git' -prune -o \
              -name package.json -print
          )
