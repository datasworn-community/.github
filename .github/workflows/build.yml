name: Build

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: Build and validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        uses: datasworn-community/.github/.github/actions/bun-build@v1
        with:
          validate: "true"
