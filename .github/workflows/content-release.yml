name: Content Release

on:
  workflow_call:
    inputs:
      package-dir:
        description: Directory where the caller build writes publishable packages.
        type: string
        default: dist/packages
      dry-run:
        description: Calculate release actions without publishing.
        type: boolean
        default: false
    secrets:
      NPM_TOKEN:
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  release:
    name: Publish changed content packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        uses: datasworn-community/.github/.github/actions/bun-build@v1
        with:
          validate: "true"

      - name: Setup Node for npm publishing
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Setup npm
        run: |
          npm install --global npm@latest
          npm config set registry https://registry.npmjs.org/
          npm --version

      - name: Publish changed packages
        id: publish
        uses: datasworn-community/.github/.github/actions/publish-content-packages@v1
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        with:
          mode: release
          package-dir: ${{ inputs.package-dir }}
          dry-run: ${{ inputs.dry-run }}

      - name: Write summary
        if: steps.publish.outputs.summary != ''
        run: |
          cat <<'EOF' >> "${GITHUB_STEP_SUMMARY}"
          ${{ steps.publish.outputs.summary }}
          EOF
