name: Release

on:
  workflow_call:
    secrets:
      NPM_TOKEN:
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish packages
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        uses: datasworn-community/.github/.github/actions/bun-build@v1

      - name: Setup Node for npm publishing
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Setup npm
        run: |
          npm install --global npm@latest
          npm config set registry https://registry.npmjs.org/
          npm --version

      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r manifest; do
            if node -e "const pkg=require(process.argv[1]); process.exit(pkg.private ? 0 : 1)" "$manifest"; then
              continue
            fi

            package_dir="$(dirname "$manifest")"
            package_name="$(node -p "require(process.argv[1]).name" "$manifest")"
            echo "Publishing ${package_name} from ${package_dir}"
            npm publish "$package_dir" --access public --provenance
          done < <(
            find . \
              -path './node_modules' -prune -o \
              -path './.git' -prune -o \
              -name package.json -print
          )
